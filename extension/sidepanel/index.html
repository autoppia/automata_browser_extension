<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automata</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="app">
      <header class="hero card glass">
        <div class="hero-main">
          <p class="kicker">AUTOMATA LOCAL OPERATOR</p>
          <h1>Automata</h1>
          <p class="subtitle">Live extension runner against local /act endpoint</p>
        </div>
        <div class="hero-chips">
          <span id="connectionBadge" class="badge badge-offline">Disconnected</span>
          <span id="providerBadge" class="badge badge-mock">Local Operator</span>
          <button id="compactLogoutBtn" class="btn ghost compact-logout">Logout</button>
        </div>
      </header>

      <section id="authCard" class="card section">
        <div class="section-head">
          <h2>Connect</h2>
          <button id="logoutBtn" class="btn ghost">Logout</button>
        </div>
        <p class="muted">Optional: cloud token bootstrap with <code>AUTOMATA_API_KEY</code>. For browser actions this panel uses local operator <code>127.0.0.1:5060</code>.</p>
        <div class="input-wrap">
          <input id="apiKeyInput" type="password" placeholder="amk_..." autocomplete="off" />
          <button id="connectBtn" class="btn primary">Connect</button>
        </div>
      </section>

      <section class="card section">
        <div class="section-head">
          <h2>Run Prompt</h2>
          <span id="runMeta" class="meta">Idle</span>
        </div>

        <textarea id="promptInput" rows="4" placeholder="Ask Automata to do something in the browser..."></textarea>
        <input id="startUrlInput" type="text" placeholder="Optional start URL (https://...)" autocomplete="off" />

        <div class="actions-row">
          <button id="startRunBtn" class="btn primary wide">Run</button>
          <button id="cancelRunBtn" class="btn danger">Cancel</button>
        </div>

        <p id="statusLine" class="status">Idle</p>
      </section>

      <section class="card section">
        <div class="section-head">
          <h2>Timeline</h2>
        </div>
        <ul id="timelineList" class="timeline"></ul>
      </section>

      <section class="card section">
        <div class="section-head">
          <h2>Recent Runs</h2>
        </div>
        <ul id="historyList" class="history"></ul>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
