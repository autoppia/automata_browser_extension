<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automata</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <h1>Automata</h1>
          <p class="subtitle">Cloud extension client (mock mode)</p>
        </div>
        <span id="connectionBadge" class="badge badge-offline">Disconnected</span>
      </header>

      <section class="card" id="authCard">
        <h2>Connect</h2>
        <p class="muted">Paste your AUTOMATA_API_KEY to exchange tokens.</p>
        <div class="row">
          <input id="apiKeyInput" type="password" placeholder="amk_..." autocomplete="off" />
          <button id="connectBtn">Connect</button>
        </div>
        <div class="row right">
          <button id="logoutBtn" class="ghost">Logout</button>
        </div>
      </section>

      <section class="card">
        <h2>Run Prompt</h2>
        <textarea id="promptInput" rows="4" placeholder="Ask Automata to do something in the browser..."></textarea>
        <input id="startUrlInput" type="text" placeholder="Optional start URL (https://...)" autocomplete="off" />
        <div class="row">
          <button id="startRunBtn">Run</button>
          <button id="cancelRunBtn" class="danger">Cancel</button>
        </div>
        <p id="statusLine" class="status">Idle</p>
      </section>

      <section class="card">
        <h2>Timeline</h2>
        <ul id="timelineList" class="timeline"></ul>
      </section>

      <section class="card">
        <h2>Recent Runs</h2>
        <ul id="historyList" class="history"></ul>
      </section>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
