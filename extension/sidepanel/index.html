<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automata</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-image"></div>
    <div class="bg-grid"></div>
    <main class="app">
      <header class="hero">
        <img class="brand-logo" src="../assets/images/logos/automata_dark.webp" alt="Automata" />
        <p class="powered">Powered by <span>Bittensor</span></p>
      </header>

      <section class="card prompt-card">
        <button id="compactLogoutBtn" class="btn ghost compact-logout">Cloud Logout</button>

        <textarea id="promptInput" rows="3" placeholder="Ask me anything..."></textarea>
        <input id="startUrlInput" type="text" placeholder="Website URL... (optional)" autocomplete="off" />

        <div class="actions-row">
          <button id="startRunBtn" class="btn primary wide">Run</button>
          <button id="cancelRunBtn" class="btn danger">Cancel</button>
        </div>
        <p class="tip">Tip: <code>Ctrl/Cmd + Enter</code></p>

        <p id="statusLine" class="status">Ready.</p>
      </section>

      <section class="card section">
        <div class="section-head">
          <h2>Execution Steps</h2>
          <span class="meta">Live log</span>
        </div>
        <ul id="timelineList" class="timeline"></ul>
      </section>

      <section class="card section">
        <div class="section-head">
          <h2>Recent Runs</h2>
        </div>
        <ul id="historyList" class="history"></ul>
      </section>

      <section id="authCard" class="card section">
        <div class="section-head">
          <h2>Cloud Access (Optional)</h2>
          <button id="logoutBtn" class="btn ghost">Logout</button>
        </div>
        <p class="muted">Only needed for future cloud calls. Local browser execution does not require login.</p>
        <div class="input-wrap">
          <input id="apiKeyInput" type="password" placeholder="amk_..." autocomplete="off" />
          <button id="connectBtn" class="btn primary">Connect</button>
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
